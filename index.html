    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=PT+Mono&family=Rationale&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cousine:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script>
      (function () {
        const redirect = window.location.search.match(/[?&]redirect=([^&]+)/);

        if (!redirect) {
          return;
        }

        const decodedPath = decodeURIComponent(redirect[1]);
        const nextUrl = `${window.location.origin}${decodedPath}${window.location.hash}`;

        window.history.replaceState(null, "", nextUrl);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
